<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Cadastro — PsiCEP</title>
  <link rel="stylesheet" href="style/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box fade-up" style="width:min(560px,100%)">
      <div class="auth-brand">
        <div class="brand-icon">🌿</div>
        <span>PsiCEP</span>
      </div>
      <h2>Criar Cadastro</h2>
      <p class="auth-sub">Preencha os dados abaixo. Após o envio, aguarde aprovação da psicóloga em até 24 horas.</p>

      <div id="alertBox"></div>

      <form id="formCadastro">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nome completo *</label>
            <input type="text" id="nome" class="form-control" placeholder="Seu nome completo" required />
          </div>
          <div class="form-group">
            <label class="form-label">Matrícula *</label>
            <input type="text" id="matricula" class="form-control" placeholder="Ex: 2024001" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">CPF *</label>
            <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" required />
          </div>
          <div class="form-group">
            <label class="form-label">Telefone *</label>
            <input type="text" id="telefone" class="form-control" placeholder="(00) 00000-0000" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Curso *</label>
            <input type="text" id="curso" class="form-control" placeholder="Ex: Administração" required />
          </div>
          <div class="form-group">
            <label class="form-label">Turma *</label>
            <input type="text" id="turma" class="form-control" placeholder="Ex: ADM-1A" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">E-mail *</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required />
        </div>

        <button type="submit" class="btn btn-primary btn-full mt-16">
          Solicitar cadastro
        </button>
      </form>

      <div class="auth-footer">
        Já tem cadastro? <a href="login-aluno.html">Fazer login</a>
        &nbsp;·&nbsp;
        <a href="index.html">Voltar</a>
      </div>
    </div>
  </div>

  <script src="js/dados.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
